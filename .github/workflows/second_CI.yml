name: second_CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build-test:
    runs-on: ubuntu-latest
  
    steps:
      - name: "code checkout"
        uses: actions/checkout@v4

      - name: "setup node.js"
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: install dependencies
        run: npm install

      - name: Run test (If any)
        run: npm test --if-present

  docker-build-deploy:
    runs-on: ubuntu-latest # Fixed spelling
    needs: build-test

    steps:
      - name: Checkout code # Added space
        uses: actions/checkout@v4

      - name: Login to Docker hub 
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build and push # Added space
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/node-app:latest
