name: second_CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:

  # ─── JOB 1: Run tests ───────────────────────────────────────
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Code checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test --if-present

  # ─── JOB 2: Build Docker image & push ───────────────────────
  docker-build-deploy:
    runs-on: ubuntu-latest
    needs: build-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    env:
      DOCKERHUB_USERNAME: ${{ fromJSON(toJSON(secrets)).DOCKERHUB_USERNAME }}
      DOCKERHUB_PASSWORD: ${{ fromJSON(toJSON(secrets)).DOCKERHUB_PASSWORD }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_PASSWORD }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.DOCKERHUB_USERNAME }}/node-app:latest

  # ─── JOB 3: Tell Render to redeploy ─────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: build-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    env:
      RENDER_DEPLOY_HOOK: ${{ fromJSON(toJSON(secrets)).RENDER_DEPLOY_HOOK }}

    steps:
      - name: Trigger Render deploy
        run: curl --fail --silent --show-error "$RENDER_DEPLOY_HOOK"
