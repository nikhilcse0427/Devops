name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build and test
    runs-on: ubuntu-latest
    steps:
      - name: Workflow started
        run: |
          echo "Event: ${{ github.event_name }}"
          echo "Ref: ${{ github.ref }}"
          echo "SHA: ${{ github.sha }}"

      - name: Code checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci || npm install

      - name: Run tests
        run: npm test --if-present

  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: build-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Trigger Render deploy
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          HOOK="${RENDER_DEPLOY_HOOK_URL:-$RENDER_DEPLOY_HOOK}"
          if [ -z "$HOOK" ]; then
            echo "::error::Add secret RENDER_DEPLOY_HOOK_URL in GitHub → Settings → Secrets → Actions"
            exit 1
          fi
          echo "Triggering Render deploy..."
          HTTP_CODE=$(curl --fail --silent --show-error -o /tmp/render-response.txt -w "%{http_code}" "$HOOK")
          echo "Render responded with HTTP $HTTP_CODE"
          cat /tmp/render-response.txt
          echo "Deploy triggered. Check Render dashboard → Events for build logs."

  docker-build-deploy:
    name: Docker Hub (optional)
    runs-on: ubuntu-latest
    needs: build-test
    # Render deploy does not use Docker Hub — do not fail the pipeline if this job fails.
    continue-on-error: true
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_PASSWORD: ${{ secrets.DOCKERHUB_PASSWORD }}
    steps:
      - name: Check Docker Hub secrets
        id: docker
        run: |
          if [ -n "$DOCKERHUB_USERNAME" ] && [ -n "$DOCKERHUB_PASSWORD" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
            echo "Docker Hub secrets found — will attempt login."
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "Docker Hub skipped. Set DOCKERHUB_USERNAME + DOCKERHUB_PASSWORD to enable (optional)."
          fi

      - name: Checkout code
        if: steps.docker.outputs.configured == 'true'
        uses: actions/checkout@v4

      - name: Login to DockerHub
        if: steps.docker.outputs.configured == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_PASSWORD }}

      - name: Build and push image
        if: steps.docker.outputs.configured == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.DOCKERHUB_USERNAME }}/node-app:latest
