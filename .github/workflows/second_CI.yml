name: second_CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:

  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Code checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test --if-present

  docker-build-deploy:
    runs-on: ubuntu-latest
    needs: build-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Check Docker Hub secrets
        id: docker
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          if [ -z "$DOCKERHUB_USERNAME" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "Docker Hub secrets not set — skipping image push (optional)."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout code
        if: steps.docker.outputs.configured == 'true'
        uses: actions/checkout@v4

      - name: Login to DockerHub
        if: steps.docker.outputs.configured == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build and push image
        if: steps.docker.outputs.configured == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/node-app:latest

  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: build-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: ${{ steps.deploy.outputs.service_url }}

    steps:
      - name: Trigger Render deploy
        id: deploy
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
          RENDER_SERVICE_URL: ${{ vars.RENDER_SERVICE_URL }}
        run: |
          HOOK="${RENDER_DEPLOY_HOOK_URL:-$RENDER_DEPLOY_HOOK}"
          if [ -z "$HOOK" ]; then
            echo "::error::Add RENDER_DEPLOY_HOOK_URL (or RENDER_DEPLOY_HOOK) in GitHub → Settings → Secrets → Actions."
            exit 1
          fi
          echo "Triggering Render deploy..."
          curl --fail --silent --show-error "$HOOK"
          echo "Render deploy triggered successfully."
          if [ -n "$RENDER_SERVICE_URL" ]; then
            echo "service_url=$RENDER_SERVICE_URL" >> "$GITHUB_OUTPUT"
          fi
